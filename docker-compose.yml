version: '3.9'

# ============================================================
# INEZA PLATFORM — DOCKER COMPOSE
# Production-ready full-stack deployment
# Usage: docker-compose up -d
# ============================================================

services:

  # ── PostgreSQL Database ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ineza-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-ineza_platform}
      POSTGRES_USER:     ${DB_USER:-ineza_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/models/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ineza_admin} -d ${DB_NAME:-ineza_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ineza-net
    ports:
      - "127.0.0.1:5432:5432"

  # ── Redis Cache & Sessions ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ineza-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ineza-net
    ports:
      - "127.0.0.1:6379:6379"

  # ── Node.js Backend API ───────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ineza-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:            production
      PORT:                5000
      DATABASE_URL:        postgresql://${DB_USER:-ineza_admin}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-ineza_platform}
      REDIS_URL:           redis://:${REDIS_PASSWORD:-}@redis:6379
      JWT_SECRET:          ${JWT_SECRET}
      JWT_REFRESH_SECRET:  ${JWT_REFRESH_SECRET}
      FRONTEND_URL:        ${FRONTEND_URL:-https://inezaagencies.rw}
      # Payments
      MOMO_BASE_URL:       ${MOMO_BASE_URL}
      MOMO_COLLECTION_KEY: ${MOMO_COLLECTION_KEY}
      MOMO_API_USER:       ${MOMO_API_USER}
      MOMO_API_KEY:        ${MOMO_API_KEY}
      MOMO_ENVIRONMENT:    ${MOMO_ENVIRONMENT:-sandbox}
      AIRTEL_CLIENT_ID:    ${AIRTEL_CLIENT_ID}
      AIRTEL_CLIENT_SECRET:${AIRTEL_CLIENT_SECRET}
      STRIPE_SECRET_KEY:   ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET:${STRIPE_WEBHOOK_SECRET}
      # Files
      CLOUDINARY_CLOUD_NAME:${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY:  ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET:${CLOUDINARY_API_SECRET}
      # Email
      EMAIL_HOST:          ${EMAIL_HOST:-smtp.sendgrid.net}
      EMAIL_PORT:          ${EMAIL_PORT:-587}
      EMAIL_USER:          ${EMAIL_USER:-apikey}
      EMAIL_PASS:          ${EMAIL_PASS}
      EMAIL_FROM:          ${EMAIL_FROM:-noreply@inezaagencies.rw}
    volumes:
      - api_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ineza-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.inezaagencies.rw`)"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"

  # ── Nginx (Frontend + Reverse Proxy) ─────────────────────
  nginx:
    image: nginx:alpine
    container_name: ineza-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./:/usr/share/nginx/html:ro
      - nginx_certs:/etc/nginx/ssl
      - nginx_logs:/var/log/nginx
    networks:
      - ineza-net

volumes:
  postgres_data:
  redis_data:
  api_logs:
  nginx_certs:
  nginx_logs:

networks:
  ineza-net:
    driver: bridge
