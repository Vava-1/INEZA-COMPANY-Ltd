# ============================================================
# INEZA PLATFORM — NGINX CONFIGURATION
# Serves static frontend + reverse-proxies to Node.js API
# Domain: inezaagencies.rw
# ============================================================

worker_processes auto;
pid /tmp/nginx.pid;
events { worker_connections 1024; multi_accept on; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ─────────────────────────────────────────────
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
  access_log  /var/log/nginx/access.log  main;
  error_log   /var/log/nginx/error.log   warn;

  # ── Performance ──────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  gzip               on;
  gzip_types         text/plain text/css application/json application/javascript
                     text/xml application/xml text/javascript image/svg+xml;
  gzip_vary          on;
  gzip_min_length    256;
  gzip_comp_level    6;
  client_max_body_size 15M;

  # ── Rate limiting ────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
  limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

  # ── Upstream Node.js API ─────────────────────────────────
  upstream api_backend {
    server api:5000;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ────────────────────────────────
  server {
    listen 80;
    server_name inezaagencies.rw www.inezaagencies.rw;
    return 301 https://$host$request_uri;
  }

  # ── Main HTTPS Server ────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name inezaagencies.rw www.inezaagencies.rw;

    # ── SSL Certificates (Let's Encrypt / Certbot) ──────────
    ssl_certificate     /etc/nginx/ssl/inezaagencies.rw/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/inezaagencies.rw/privkey.pem;

    # ── SSL Hardening ────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDH+AESGCM:DH+AESGCM:ECDH+AES256:DH+AES256:ECDH+AES128:DH+AES:!aNULL:!MD5:!DSS;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                  always;
    add_header X-Content-Type-Options    "nosniff"                     always;
    add_header X-XSS-Protection         "1; mode=block"               always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: res.cloudinary.com *.cloudinary.com; connect-src 'self' api.stripe.com sandbox.momodeveloper.mtn.com openapi.airtel.africa; frame-ancestors 'none';" always;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip static ──────────────────────────────────────────
    gzip_static on;

    # ── API Proxy ────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        'upgrade';
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # ── Auth Routes (stricter rate limit) ────────────────────
    location /api/v1/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Socket.IO ────────────────────────────────────────────
    location /socket.io/ {
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_read_timeout 86400s;
    }

    # ── Health Check ─────────────────────────────────────────
    location /health {
      proxy_pass http://api_backend;
      access_log off;
    }

    # ── Static Assets (aggressive caching) ───────────────────
    location ~* \.(css|js)$ {
      expires     1y;
      add_header  Cache-Control "public, immutable";
      add_header  Vary Accept-Encoding;
      gzip_static on;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
      expires    6M;
      add_header Cache-Control "public";
      access_log off;
    }

    # ── HTML (no cache — always fresh) ───────────────────────
    location ~* \.html$ {
      expires    -1;
      add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── SPA Fallback ─────────────────────────────────────────
    location / {
      try_files $uri $uri/ $uri.html /index.html;
    }

    # ── 404 ──────────────────────────────────────────────────
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
      root /usr/share/nginx/html;
    }

    # ── Block common attack paths ────────────────────────────
    location ~* (wp-admin|wp-login|phpMyAdmin|\.env|\.git) {
      deny all;
      return 404;
    }
  }
}
